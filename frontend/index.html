<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0e1a" media="(prefers-color-scheme: dark)" />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/Inter-Variable.woff2" crossorigin />
    <title>ResearchPilot</title>
    <script>
      // Set the theme attribute before first paint to avoid a flash of the wrong theme —
      // ThemeContext owns theme state after mount, this only prevents the initial FOUC.
      ;(function () {
        try {
          var stored = localStorage.getItem('research-pilot-theme')
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          document.documentElement.dataset.theme = theme
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
